# SwiftLint configuration for Bonk
# https://realm.github.io/SwiftLint/rule-directory.html

# Excluded paths
excluded:
  - DerivedData
  - .build
  - Packages
  - Bonk/Models/Resources/SFSymbolNames.swift  # Auto-generated, 8000+ lines
  - .claude

# Rule configuration
line_length:
  warning: 120
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 400
  error: 800

type_body_length:
  warning: 350
  error: 500

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 12
  error: 20

identifier_name:
  min_length: 3
  max_length: 40
  excluded:
    - id
    - ok
    - os
    - ai
    - ui

type_name:
  min_length: 3
  excluded:
    - iCloudSyncService

# Disabled rules
disabled_rules:
  - trailing_comma  # Allow trailing commas in multiline collections
  - opening_brace   # Conflicts with SwiftFormat wrapMultilineStatementBraces
